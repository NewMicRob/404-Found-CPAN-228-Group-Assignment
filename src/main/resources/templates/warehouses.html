<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Warehouses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">

</head>
<body>
<div th:replace="~{Fragments/navBar :: navbar}"></div>
<main class="container mt-5">

<h2>Warehouses List</h2>

<div class="card-cont shadow-sm">
    <div class="main-card">
        <table class="table table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Address</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="warehouse : ${warehouses}">
                <td th:text="${warehouse.id}"></td>
                <td th:text="${warehouse.name}"></td>
                <td th:text="${warehouse.address}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="mt-3">
    <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#createWarehouseModal"
            sec:authorize="hasRole('ADMIN')">
        Add Warehouse
    </button>
</div>

</main>
<div th:replace="Fragments/createWarehouse_modal :: createWarehouse_modal"></div>

<div th:replace="~{Fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
