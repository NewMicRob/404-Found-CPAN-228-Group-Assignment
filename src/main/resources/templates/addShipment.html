<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Add Shipment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{Fragments/navBar :: navbar}"></div>
<main class="container mt-5">
    <h2>Add Shipment</h2>
    <form th:action="@{/shipments/create}" th:object="${shipment}" method="post">
        
        <label>Product:</label>
        <select th:field="*{product}" required>
            <option th:each="product : ${productList}" th:value="${product.id}" th:text="${product.name}"></option>
        </select>
        
        <label>Warehouse:</label>
        <select th:field="*{warehouse}" required>
            <option th:each="warehouse : ${warehouseList}" th:value="${warehouse.id}" th:text="${warehouse.name}"></option>
        </select>
        
        <label>Quantity Shipped:</label>
        <input type="number" th:field="*{quantityShipped}" required>
        
        <label>Shipment Value:</label>
        <input type="number" step="0.01" th:field="*{shipmentValue}" required>
        
        <button type="submit">Add Shipment</button>
    </form>
</main>
<div th:replace="~{Fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
