<div th:fragment="updateInventory_modal" class="modal fade" id="updateInventoryModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Update Inventory</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form th:action="@{/inventory/update}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Product:</label>
                        <select name="productId" class="form-select" required>
                            <option th:each="product : ${productList}" 
                                    th:value="${product.id}" 
                                    th:text="${product.name}">
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Warehouse:</label>
                        <select name="warehouseId" class="form-select" required>
                            <option th:each="warehouse : ${warehouseList}" 
                                    th:value="${warehouse.id}" 
                                    th:text="${warehouse.name}">
                            </option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Amount:</label>
                        <input type="number" name="amount" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Update Stock</button>
                </form>
            </div>
        </div>
    </div>
</div>
