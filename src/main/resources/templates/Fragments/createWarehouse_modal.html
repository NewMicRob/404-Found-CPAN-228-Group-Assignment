<div th:fragment="createWarehouse_modal" class="modal fade" id="createWarehouseModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Create a Warehouse</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <!-- I changed the form action to use your create post mapping for use on the homepage as well as the warehouse page -->
                <form th:action="@{/warehouses/create}" th:object="${warehouse}" method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Name:</label>
                        <input type="text" id="name" th:field="*{name}" class="form-control" required>
                        <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></div>
                    </div>

                    <div class="mb-3">
                        <label for="address" class="form-label">Address:</label>
                        <input type="text" id="address" th:field="*{address}" class="form-control" required>
                        <div th:if="${#fields.hasErrors('address')}" th:errors="*{address}" class="text-danger"></div>
                    </div>

                    <button type="submit" class="btn btn-primary">Create Warehouse</button>
                </form>
            </div>
        </div>
    </div>
</div>
