<div th:fragment="createShipment_modal" class="modal fade" id="createShipmentModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Create a Shipment</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form th:action="@{/shipments/create}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Product:</label>
                        <select name="product.id" class="form-select" required>
                            <option th:each="product : ${productList}" 
                                    th:value="${product.id}" 
                                    th:text="${product.name}">
                            </option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Warehouse:</label>
                        <select name="warehouse.id" class="form-select" required>
                            <option th:each="warehouse : ${warehouseList}" 
                                    th:value="${warehouse.id}" 
                                    th:text="${warehouse.name}">
                            </option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Quantity Shipped:</label>
                        <input type="number" name="quantityShipped" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Shipment Value:</label>
                        <input type="number" step="0.01" name="shipmentValue" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Create Shipment</button>
                </form>
            </div>
        </div>
    </div>
</div>
