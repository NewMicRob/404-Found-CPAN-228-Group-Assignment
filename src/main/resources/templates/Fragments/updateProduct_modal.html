<div th:fragment="updateProduct_modal">
    <div class="modal fade" id="updateProduct_modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Update Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <form th:action="@{/products/update}" method="POST" >

                        <input type="hidden" id="update-id" name="id"/>

                        <!--name-->
                        <div class="mb-3">
                            <label for="update-name" class="form-label">Name:</label>
                            <input type="text" id="update-name" name="name" class="form-control" required minlength="2" maxlength="240">
                            <div  class="text-danger">
                            </div>
                        </div>

                        <!--price-->
                        <div class="mb-3">
                            <label for="update-price" class="form-label">Price:</label>
                            <input type="number" id="update-price" name="price" class="form-control" step="0.01" min="0.01" required>
                            <div   class="text-danger">
                            </div>
                        </div>

                        <!--taxRate-->
                        <div class="mb-3">
                            <label class="form-label">Tax Rate:</label>
                            <select id="update-taxRate" name="taxRate" class="form-select">
                                <option value="0.13">13%</option>
                                <option value="0.05">5%</option>
                            </select>
                        </div>

                        <!--category-->
                        <div class="mb-3">
                            <label class="form-label">Category:</label>
                            <select id="update-category" name="category.id" class="form-select">
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name}">
                                </option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary">Update Product</button>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
