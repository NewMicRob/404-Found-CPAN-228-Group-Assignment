<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<body>
<div th:fragment="updateProduct_modal">
    <div class="modal fade" id="updateProductModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Update Product</h5>
                    <a href="/products" class="btn-close"></a>
                </div>

                <div class="modal-body">

                    <form th:action="@{/products/update/{id}(id=${product.id})}"
                          th:object="${product}"
                          method="POST">

                        <div class="mb-3">
                            <label class="form-label">Name:</label>
                            <input type="text" th:field="*{name}" class="form-control" required>
                            <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Price:</label>
                            <input type="number" step="0.01" th:field="*{price}" class="form-control" required>
                            <div th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="text-danger"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Tax Rate:</label>
                            <select th:field="*{taxRate}" class="form-select">
                                <option th:value="13">13%</option>
                                <option th:value="5">5%</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Category:</label>
                            <select th:field="*{category.id}" class="form-select">
                                <option th:each="cat : ${parentCategories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name}">
                                </option>
                            </select>
                        </div>

                        <input type="hidden" th:field="*{deleted}"/>

                        <button type="submit" class="btn btn-primary">
                            Update Product
                        </button>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
