<div th:fragment="categoriesTable">
    <div class="card-cont shadow-sm">
        <div class="main-card">
            <table class="table table-hover align-middle table-auto"
                   style="width: auto; min-width: 300px; max-width: fit-content; display: inline-table;">
                <thead class="table-light">
                <tr>
                    <th>Category</th>
                    <th>Subcategories</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="category : ${parentCategories}">
                    <td style="vertical-align: top; padding-right: 20px;" th:text="${category.name}"></td>
                    <td style="padding-left: 20px;">
                        <div th:each="child : ${category.children}" th:text="${child.name}"></div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
