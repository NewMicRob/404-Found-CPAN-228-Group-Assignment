<div th:fragment="createProduct_modal">
    <div class="modal fade" id="createProductModal">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form th:action="@{/products}" th:object="${product}" method="POST">
                        <div class="mb-3">
                            <label for="name" class="form-label">Name:</label>
                            <input type="text" id="name" th:field="*{name}" class="form-control" required minlength="2" maxlength="240">
                            <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="price" class="form-label">Price:</label>
                            <input type="number" id="price" th:field="*{price}" class="form-control" step="0.01" min="0.01" required>
                            <div th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="text-danger">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="taxRate" class="form-label">Tax Rate:</label>
                            <select id="taxRate" th:field="*{taxRate}" class="form-select" required>
                                <option th:value="13" th:text="'13%'"></option>
                                <option th:value="5" th:text="'5%'"></option>
                            </select>
                            <div th:if="${#fields.hasErrors('taxRate')}" th:errors="*{taxRate}" class="text-danger"></div>
                        </div>

                        <div class="mb-3">
                            <label for="category" class="form-label">Category:</label>
                            <select id="category" th:field="*{category}" class="form-select" required>
                                <option value="" disabled selected>Select a category</option>
                                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                            </select>
                            <div th:if="${#fields.hasErrors('category')}" th:errors="*{category}" class="text-danger"></div>
                        </div>

                        <input type="hidden" th:field="*{deleted}" value="false"/>

                        <button type="submit" class="btn btn-primary">Create Product</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
