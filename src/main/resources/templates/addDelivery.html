<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Add Delivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{Fragments/NavBar :: navbar}"></div>
<main class="container mt-5">
    <h2>Add Delivery</h2>
    <form th:action="@{/deliveries/addDelivery}" th:object="${delivery}" method="post">
        
        <label>Product:</label>
        <select th:field="*{product}" required>
            <option th:each="product : ${productList}" th:value="${product.id}" th:text="${product.name}"></option>
        </select>
        
        <label>Warehouse:</label>
        <select th:field="*{warehouse}" required>
            <option th:each="warehouse : ${warehouseList}" th:value="${warehouse.id}" th:text="${warehouse.name}"></option>
        </select>
        
        <label>Quantity Received:</label>
        <input type="number" th:field="*{quantityReceived}" required>
        
        <label>Unit Cost:</label>
        <input type="number" step="0.01" th:field="*{unitCost}" required>
        
        <label>Delivered By:</label>
        <input type="text" th:field="*{deliveredBy}" required>
        
        <button type="submit">Add Delivery</button>
    </form>

</main>
<div th:replace="~{Fragments/Footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
