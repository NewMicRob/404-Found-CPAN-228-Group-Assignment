<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>StockFlow - Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div th:replace="~{Fragments/navBar :: navbar}"></div>
<main class="container mt-5">
  <div class="app-container">
    <div class="app-header">
      <h1>Registration</h1>
    </div>

    <div class="register-card">
      <form th:action="@{/register}" th:object="${user}" method="POST" novalidate>

        <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="alert alert-danger">
        </div>

        <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="alert alert-danger">
        </div>

        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input type="text" class="form-control" id="username" th:field="*{username}" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''" required>
        </div>

        <div class="mb-3" >
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" th:field="*{password}" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''" required>
        </div>

        <!--Select a user role-->
        <div class="mb-3">
          <label for="role" class="form-label">Role</label>
          <select class="form-select" id="role" th:field="*{role}" required>
            <option value="VIEWER">Viewer</option>
            <option value="STAFF">Staff</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary btn-lg">Register</button>
      </form>
      <div style="text-align: center;">
        <div class="mt-3">
          <p>Click <a th:href="@{/login}">here</a> to login</p>
        </div>
      </div>
    </div>
  </div>

</main>
<div th:replace="~{Fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
