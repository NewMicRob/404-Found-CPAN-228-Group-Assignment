<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin - Users</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>
<div th:replace="~{Fragments/navBar :: navbar}"></div>

<main class="container mt-5">

  <h2>Admin Interface - Users</h2>
  <!-- Search -->
  <form th:action="@{/admin}" method="get" class="filter-form">
    <div class="filter-row">
      <div>
        <label>Username:</label>
        <input type="text"
               name="search"
               placeholder="Enter username"
               th:value="${search}">
      </div>

      <div>
        <button class="btn btn-primary" type="submit">Search</button>
      </div>
    </div>
  </form>

  <!-- Table -->
  <div class="card-cont shadow-sm">
    <div class="main-card">
      <table class="table table-hover align-middle">
        <thead class="table-light">
        <tr>
          <th>ID</th>
          <th>Username</th>
          <th>Role</th>
          <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="user : ${users}">
          <td th:text="${user.id}"></td>
          <td th:text="${user.username}"></td>
          <td th:text="${user.role}"></td>

          <td>
            <!-- Update -->
            <button type="button"
                    class="btn btn-sm"
                    style="background-color: transparent; border: none; margin-right: 20px"
                    data-bs-toggle="modal"
                    data-bs-target="#updateUser_modal"
                    th:attr="data-id=${user.id}"
                    onclick="openUpdateModal(this)">
              ✏️
            </button>

            <!-- Delete -->
            <form th:action="@{/admin/delete/{id}(id=${user.id})}"
                  method="post"
                  style="display:inline;">
              <button type="submit"
                      style="background-color: transparent; border: none;">
                ❌
              </button>
            </form>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Pagination (unchanged) -->
  <div style="padding: 15px 20px; border-top: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: #666;">

    <span>
        Showing <span th:text="${startIndex}">1</span>
        to <span th:text="${endIndex}">10</span>
        of <span th:text="${total}">100</span> entries
    </span>

    <div style="display:flex; gap:5px; align-items:center;">

      <a th:if="${currentPage > 0}"
         th:href="@{/admin(search=${search}, page=0)}">« First</a>

      <a th:if="${hasPrevious}"
         th:href="@{/admin(search=${search}, page=${currentPage - 1})}">‹ Prev</a>

      <span>
        Page <span th:text="${currentPage + 1}">1</span>
        of <span th:text="${totalPages}">5</span>
      </span>

      <a th:if="${hasNext}"
         th:href="@{/admin(search=${search}, page=${currentPage + 1})}">Next ›</a>

      <a th:if="${currentPage < totalPages - 1}"
         th:href="@{/admin(search=${search}, page=${totalPages - 1})}">Last »</a>

    </div>
  </div>

  <!-- Include USER modal -->
  <div th:replace="~{Fragments/updateUser_modal :: updateUser_modal}"></div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  function openUpdateModal(button) {
      const userId = button.getAttribute('data-id');

      fetch('/admin/get/' + userId)
          .then(response => response.json())
          .then(user => {
              document.getElementById('update-user-id').value = user.id;
              document.getElementById('update-username').value = user.username;
              document.getElementById('update-role').value = user.role;

              let modal = new bootstrap.Modal(document.getElementById('updateUser_modal'));
              modal.show();
          });
  }
</script>

</body>
</html>
