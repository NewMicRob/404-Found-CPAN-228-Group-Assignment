<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <title>StockFlow - Warehouses</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/style.css}">

</head>
<body>
<div th:replace="~{Fragments/navBar :: navbar}"></div>
<main class="container mt-5">

  <h2>Admin Interface</h2>
  <form th:action="@{/admin}" method="get" class="filter-form">

    <div class="filter-row">
      <div>
        <label>Product name:</label>
        <label>
          <input type="text"
                 name="search"
                 placeholder="Enter product name"
                 th:value="${search}">
        </label>
      </div>

      <div>
        <button class="btn btn-primary" type="submit">Search</button>
      </div>
    </div>

  </form>

  <div class="card-cont shadow-sm">
    <div class="main-card">
      <table class="table table-hover align-middle">
        <thead class="table-light">
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Price</th>
          <th>Tax Rate</th>
          <th>Category</th>
          <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
          <td th:text="${product.id}"></td>
          <td th:text="${product.name}"></td>
          <td th:text="${product.price}"></td>
          <td th:text="${product.taxRate}"></td>
          <td th:text="${product.category.name}"></td>
          <td>
            <!--Update icon-->
            <button type="button"
                    class="btn btn-sm btn-warning"
                    style="background-color: transparent; border: none; margin-right: 20px"
                    data-bs-toggle="modal"
                    data-bs-target="#updateProduct_modal"
                    th:attr="data-id=${product.id}"
                    onclick="openUpdateModal(this)">
              ✏️
            </button>
            <!--Delete icon-->
            <form th:action="@{/admin/delete/{id}(id=${product.id})}" method="post" style="display:inline;">
              <button type="submit"
                      class="btn btn-sm btn-warning"
                      style="background-color: transparent; border: none;"
                      title="Delete">
                ❌
              </button>
            </form>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Pagination Footer -->
  <div style="padding: 15px 20px; border-top: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: #666;">

    <!-- Showing info -->
    <span>
        Showing <span th:text="${startIndex}">1</span>
        to <span th:text="${endIndex}">10</span>
        of <span th:text="${total}">100</span> entries
    </span>

    <!-- Pagination controls -->
    <div style="display:flex; gap:5px; align-items:center;">

      <!-- First -->
      <a th:if="${currentPage > 0}"
         th:href="@{/admin(search=${search}, page=0)}"
         style="padding:6px 10px;border:1px solid #ddd;background:white;border-radius:4px;text-decoration:none;">
        « First
      </a>
      <span th:if="${currentPage == 0}"
            style="padding:6px 10px;border:1px solid #ddd;background:#f5f5f5;border-radius:4px;">
            « First
        </span>

      <!-- Previous -->
      <a th:if="${hasPrevious}"
         th:href="@{/admin(search=${search}, page=${currentPage - 1})}"
         style="padding:6px 10px;border:1px solid #ddd;background:white;border-radius:4px;text-decoration:none;">
        ‹ Prev
      </a>
      <span th:if="${!hasPrevious}"
            style="padding:6px 10px;border:1px solid #ddd;background:#f5f5f5;border-radius:4px;">
            ‹ Prev
        </span>

      <!-- Page info -->
      <span style="padding:6px 10px;">
            Page <span th:text="${currentPage + 1}">1</span>
            of <span th:text="${totalPages}">5</span>
        </span>

      <!-- Next -->
      <a th:if="${hasNext}"
         th:href="@{/admin(search=${search}, page=${currentPage + 1})}"
         style="padding:6px 10px;border:1px solid #ddd;background:white;border-radius:4px;text-decoration:none;">
        Next ›
      </a>
      <span th:if="${!hasNext}"
            style="padding:6px 10px;border:1px solid #ddd;background:#f5f5f5;border-radius:4px;">
            Next ›
      </span>

      <!-- Last -->
      <a th:if="${currentPage < totalPages - 1}"
         th:href="@{/admin(search=${search}, page=${totalPages - 1})}"
         style="padding:6px 10px;border:1px solid #ddd;background:white;border-radius:4px;text-decoration:none;">
        Last »
      </a>
      <span th:if="${currentPage >= totalPages - 1}"
            style="padding:6px 10px;border:1px solid #ddd;background:#f5f5f5;border-radius:4px;">
            Last »
        </span>

    </div>
  </div>

<!-- Include modal updateProduct -->
<div th:replace="~{Fragments/updateProduct_modal :: updateProduct_modal('/admin/update')}"></div>

<div th:replace="~{Fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</main>>
<script>
  function openUpdateModal(button) {
      const productId = button.getAttribute('data-id');

      fetch('/products/get/' + productId)
          .then(response => response.json())
          .then(product => {
              document.getElementById('update-id').value = product.id;
              document.getElementById('update-name').value = product.name;
              document.getElementById('update-price').value = product.price;
              document.getElementById('update-taxRate').value = String(product.taxRate);
              document.getElementById('update-category').value = product.category.id;

              // Show the modal
              let modal = new bootstrap.Modal(document.getElementById('updateProduct_modal'));
              modal.show();
          });
  }
</script>
</body>
</html>
