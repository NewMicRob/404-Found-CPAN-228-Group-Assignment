<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Deliveries</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div th:replace="~{Fragments/navBar :: navbar}"></div>
<main class="container mt-5">
    <div class="d-flex justify-content-between align-items-start mb-4">
        <h2>Deliveries</h2>
        
        <form method="get" action="/deliveries" class="d-flex gap-2">
            <input type="text" name="search" class="form-control" placeholder="Search Product or Supplier" th:value="${param.search}">
            <button type="submit" class="btn btn-primary">Search</button>
            <a href="/deliveries" class="btn btn-secondary">Clear</a>
        </form>
        
        <div class="d-flex flex-column gap-2">
            <span class="badge bg-warning text-dark px-3 py-2">
                Pending:
                <span th:text="${#aggregates.sum(deliveryList.![status == 'PENDING' ? 1 : 0])}">0</span>
            </span>
            <span class="badge bg-success px-3 py-2">
                Received:
                <span th:text="${#aggregates.sum(deliveryList.![status == 'RECEIVED' ? 1 : 0])}">0</span>
            </span>
        </div>
    </div>
    <div class="card-cont shadow-sm">
            <div class="main-card">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Product</th>
                            <th>Supplied By</th>
                            <th>To Warehouse</th>
                            <th>Quantity</th>
                            <th>Unit Cost</th>
                            <th>Total Cost</th>
                            <th>Delivery Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    
                    <tbody>
                        <tr th:each="delivery : ${deliveryList}">
                            <td th:text="${delivery.product.name}"></td>
                            <td th:text="${delivery.deliveredBy}"></td>
                            <td th:text="${delivery.warehouse.name}"></td>
                            <td th:text="${delivery.quantityReceived}"></td>
                            <td th:text="'$' + ${delivery.unitCost}"></td>
                            <td th:text="'$' + ${delivery.quantityReceived * delivery.unitCost}"></td>
                            <td th:text="${#temporals.format(delivery.deliveryDate, 'MM/dd/yyyy')}"></td>
                            <td th:text="${delivery.status}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="mt-3">
        <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#createDeliveryModal">
            Add Delivery
        </button>
    </div>
</main>

<div th:replace="Fragments/createDelivery_modal :: createDelivery_modal"></div>
    
<div th:replace="~{Fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
