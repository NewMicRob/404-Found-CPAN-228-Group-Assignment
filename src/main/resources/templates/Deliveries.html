<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Deliveries</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{Fragments/navBar :: navbar}"></div>
<main class="container mt-5">
    <h2>Deliveries List</h2>
    <table class="table table-bordered">
        
        <thead>
            <tr>
                <th>Product</th>
                <th>Warehouse</th>
                <th>Quantity</th>
                <th>Unit Cost</th>
                <th>Delivery Date</th>
                <th>Delivered By</th>
                <th>Status</th>
            </tr>
        </thead>
        
        <tbody>
            <tr th:each="delivery : ${deliveryList}">
                <td th:text="${delivery.product.name}"></td>
                <td th:text="${delivery.warehouse.name}"></td>
                <td th:text="${delivery.quantityReceived}"></td>
                <td th:text="${delivery.unitCost}"></td>
                <td th:text="${delivery.deliveryDate}"></td>
                <td th:text="${delivery.deliveredBy}"></td>
                <td th:text="${delivery.status}"></td>
            </tr>
        </tbody>
    </table>


</main>
<div th:replace="~{Fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
