<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
    <div th:replace="~{Fragments/navBar :: navbar}"></div>
        <main class="container mt-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Products</h2>
                <form method="get" action="/products" class="d-flex">
                    <input type="text" name="search" class="form-control me-2" placeholder="Search products..." th:value="${param.search}">
                    <button type="submit" class="btn btn-primary">Search</button>
                    <a href="/products" class="btn btn-secondary">Clear</a>
                </form>
            <!--    Button to open Collapse with CategoryTable-->
            <p class="d-inline-flex gap-1">
                <button class="btn btn-primary"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#collapseExample"
                        aria-expanded="false"
                        aria-controls="collapseExample">
                    Show All the categories
                </button>
            </p>
            <span class="badge bg-primary px-3 py-2">
                Total Products:
                <span th:text="${products.size()}">
                    0
                </span>
            </span>
            <div class="collapse" id="collapseExample">
                <div class="card card-body">
                    <div th:insert="Fragments/categoriesTable :: categoriesTable"></div>
                </div>
            </div>
        </div>
            <div class="card-cont shadow-sm">
                <div class="main-card">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Tax Rate</th>
                            <th>Total Price</th>
                            <th>Category</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}">
                            <td th:text="${product.id}"></td>
                            <td th:text="${product.name}"></td>
                            <td th:text="'$' + ${product.price}"></td>
                            <td th:text="${product.taxRate} + '%'"></td>
                            <td th:text="'$' + ${#numbers.formatDecimal(product.price * (1 + product.taxRate / 100), 1, 2)}"></td>
                            <td th:text="${product.category.name}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="mt-3">
            <!--    Button to open createProduct modal-->
            <button type="button" data-bs-toggle="modal" data-bs-target="#createProductModal" class="btn btn-success">
                Create Product
            </button>
                            
            <!--    Button to open createCategory modal-->
            <button type="button" data-bs-toggle="modal" data-bs-target="#createCategoryModal" class="btn btn-success">
                Create Category
            </button>
        </div>
        </main>

        <div th:replace="Fragments/createProduct_modal :: createProduct_modal"></div>
        <div th:replace="Fragments/createCategory_modal :: createCategory_modal"></div>

        <div th:replace="~{Fragments/footer :: footer}"></div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
