<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{Fragments/NavBar :: navbar}"></div>
<main class="container mt-5">
<h2>Products List</h2>

    <!--    Button to open createProduct modal-->
    <button type="button" data-bs-toggle="modal" data-bs-target="#createProductModal">
        Create Product
    </button>

    <!--    Button to open createCategory modal-->
    <button type="button" data-bs-toggle="modal" data-bs-target="#createCategoryModal">
        Create Category
    </button>

    <!--    Button to open Collapse with CategoryTable-->
    <p class="d-inline-flex gap-1">
        <button class="btn btn-primary"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#collapseExample"
                aria-expanded="false"
                aria-controls="collapseExample">
            Show All the categories
        </button>
    </p>

    <div class="collapse" id="collapseExample">
        <div class="card card-body">

            <div th:insert="fragments/categoriesTable :: categoriesTable"></div>

        </div>
    </div>

<table border="1">
    <thead>
    <tr><th>ID</th>

        <th>Name</th>
        <th>Price</th>
        <th>Tax Rate</th>
        <th>Category</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="product : ${products}">
        <td th:text="${product.id}"></td>
        <td th:text="${product.name}"></td>
        <td th:text="${product.price}"></td>
        <td th:text="${product.taxRate}"></td>
        <td th:text="${product.category.name}"></td>
    </tr>
    </tbody>
</table>

    <!-- Include modal createProduct -->
    <div th:replace="Fragments/createProduct_modal :: createProduct_modal"></div>

    <!-- Include modal createCategory -->
    <div th:replace="Fragments/createCategory_modal :: createCategory_modal"></div>

</main>
<div th:replace="~{Fragments/Footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
