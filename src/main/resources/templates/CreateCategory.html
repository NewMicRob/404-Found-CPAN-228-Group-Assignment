<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Warehouses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{Fragments/NavBar :: navbar}"></div>
<main class="container mt-5">

    <h2>Create New Category</h2>

    <form th:action="@{/categories/create}" th:object="${category}" method="post">
        <label>Name:</label>
        <input type="text" th:field="*{name}" required/><br/><br/>

        <label>Parent Category:</label>
        <select th:field="*{parent}">
            <option th:value="''" th:text="'None'"></option> <!-- default if no parent -->
            <option th:each="category : ${categories}"
                    th:value="${category.id}"
                    th:text="${category.name}">
            </option>
        </select><br/><br/>

        <button type="submit">Save Category</button>
    </form>

</main>
<div th:replace="~{Fragments/Footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
