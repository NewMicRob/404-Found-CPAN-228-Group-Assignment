<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div th:replace="~{Fragments/navBar :: navbar}"></div>
<main class="container mt-5">
    <div class="d-flex justify-content-between align-items-start mb-4">
    <h2>Categories</h2>
        
    <div class="mb-3">
        <button class="btn btn-primary" 
                type="button" 
                data-bs-toggle="collapse" 
                data-bs-target="#categoriesCollapse"
                aria-expanded="false" 
                aria-controls="categoriesCollapse">
            View All Categories
        </button>
    </div>
</div>
    <div class="collapse mb-3" id="categoriesCollapse">
        <div class="card card-body">
            <div th:insert="Fragments/categoriesTable :: categoriesTable"></div>
        </div>
    </div>

    <div class="card-cont shadow-sm">
        <div class="main-card">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Parent Category</th>
                        <th># of Items</th>
                    </tr>
                </thead>

            <tbody>
                <tr th:each="category : ${categories}">
                    <td th:text="${category.id}"></td>
                    <td th:text="${category.name}"></td>
                    <td th:text="${category.parent != null ? category.parent.name : 'None'}"></td>
                    <td th:text="${category.totalItems}"></td>
                </tr>
            </tbody>
            </table>
        </div>
    </div>

    <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#createCategoryModal">
        Create a Category
    </button>
    
</main>
    
<div th:replace="Fragments/createCategory_modal :: createCategory_modal"></div>

<div th:replace="~{Fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
