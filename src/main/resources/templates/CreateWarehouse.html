<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Warehouses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{Fragments/NavBar :: navbar}"></div>
<main class="container mt-5">

    <h2>Create Warehouse</h2>

    <form th:action="@{/warehouses/create}" th:object="${warehouse}" method="POST">

        <!-- Warehouse Name -->
        <label for="name">Name:</label>
        <input type="text" id="name" th:field="*{name}" required>
        <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        <br><br>

        <!-- Warehouse Address -->
        <label for="address">Address:</label>
        <input type="text" id="address" th:field="*{address}" required>
        <div th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
        <br><br>

        <button type="submit">Create Warehouse</button>

    </form>

</main>
<div th:replace="~{Fragments/Footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
