<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Update Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{Fragments/navBar :: navbar}"></div>
<main class="container mt-5">
    <h2>Update Inventory Stock</h2>
    <form th:action="@{/inventory/update}" method="post">
        
        <label>Product:</label>
        <select name="productId" required>
            <option th:each="product : ${productList}" th:value="${product.id}" th:text="${product.name}"></option>
        </select>
        
        <label>Warehouse:</label>
        <select name="warehouseId" required>
            <option th:each="warehouse : ${warehouseList}" th:value="${warehouse.id}" th:text="${warehouse.name}"></option>
        </select>
        
        <label>Amount:</label>
        <input type="number" name="amount" required>
        
        <button type="submit">Update Stock</button>
    </form>
</main>
<div th:replace="~{Fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
