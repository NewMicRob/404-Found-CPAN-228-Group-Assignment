<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Shipments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div th:replace="~{Fragments/navBar :: navbar}"></div>
<main class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Shipments</h2>
        
        <form method="get" action="/shipments" class="d-flex gap-2">
            <input type="text" name="search" class="form-control" placeholder="Search for a product" th:value="${param.search}">
            <button type="submit" class="btn btn-primary">Search</button>
            <a href="/shipments" class="btn btn-secondary">Clear</a>
        </form>
        
        <span class="badge bg-primary px-3 py-2">
            Total Shipments:
            <span th:text="${shipmentsList.size()}">0</span>
        </span>
    </div>

    <div class="card-cont shadow-sm">
        <div class="main-card">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Product</th>
                        <th>Warehouse</th>
                        <th>Quantity Shipped</th>
                        <th>Shipment Value</th>
                        <th>Shipment Date</th>
                    </tr>
                </thead>
            
                <tbody>
                    <tr th:each="shipment : ${shipmentsList}">
                        <td th:text="${shipment.product.name}"></td>
                        <td th:text="${shipment.warehouse.name}"></td>
                        <td th:text="${shipment.quantityShipped}"></td>
                        <td th:text="'$' + ${shipment.shipmentValue}"></td>
                        <td th:text="${#temporals.format(shipment.shipmentDate, 'MM/dd/yyyy')}"></td>
                    </tr>
                </tbody>
            </table>
            </div>
        </div>
        <div class="mt-3">
            <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addShipmentModal">
                Add Shipment
            </button>
        </div>
    </div>
</main>

<div th:replace="Fragments/createShipment_modal :: createShipment_modal"></div>

<div th:replace="~{Fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
