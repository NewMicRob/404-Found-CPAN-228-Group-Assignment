<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Shipments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{Fragments/navBar :: navbar}"></div>
<main class="container mt-5">
    <h2>Shipments List</h2>
    <table class="table table-bordered">
        
        <thead>
            <tr>
                <th>Product</th>
                <th>Warehouse</th>
                <th>Quantity Shipped</th>
                <th>Shipment Value</th>
                <th>Shipment Date</th>
            </tr>
        </thead>
        
        <tbody>
            <tr th:each="shipment : ${shipmentsList}">
                <td th:text="${shipment.product.name}"></td>
                <td th:text="${shipment.warehouse.name}"></td>
                <td th:text="${shipment.quantityShipped}"></td>
                <td th:text="${shipment.shipmentValue}"></td>
                <td th:text="${shipment.shipmentDate}"></td>
            </tr>
        </tbody>
    </table>


</main>
<div th:replace="~{Fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
