services:
  db:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mysql_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  qa-app:
    build: .
    container_name: stockflow-qa-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=qa
    depends_on:
      db:
        condition: service_healthy
    profiles:
        - qa

  dev-app:
    build: .
    container_name: stockflow-dev-app
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    depends_on:
      db:
        condition: service_healthy
    profiles:
        - dev

volumes:
  mysql_data: