services:

  app:
    build: .
    container_name: main-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=qa
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mysql_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: